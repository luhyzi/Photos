<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Photos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0c14;
  --border: rgba(255,255,255,0.1);
  --border-hi: rgba(255,255,255,0.2);
  --text: #e8eaf2;
  --muted: rgba(232,234,242,0.42);
  --accent: #7c9cff;
  --accent-hi: #a0b6ff;
  --accent-dk: #0b0c14;
  --pill-bg: rgba(12,13,24,0.40);
  --fade1: rgba(11,12,20,0.99);
  --fade2: rgba(11,12,20,0.0);
  --col: 2;
  --radius: 12px;
  --top-h: 110px;
  --bot-h: 110px;
}
body[data-theme="noir"] {
  --bg:#080808; --border:rgba(255,255,255,0.08); --border-hi:rgba(255,255,255,0.16);
  --text:#f0ede8; --muted:rgba(240,237,232,0.4);
  --accent:#d4af7a; --accent-hi:#e8c990; --accent-dk:#080808;
  --pill-bg:rgba(8,8,8,0.40); --fade1:rgba(8,8,8,0.99); --fade2:rgba(8,8,8,0.0);
}
body[data-theme="forest"] {
  --bg:#080f0a; --border:rgba(255,255,255,0.08); --border-hi:rgba(255,255,255,0.16);
  --text:#e8f0ea; --muted:rgba(232,240,234,0.42);
  --accent:#6dbf7e; --accent-hi:#8ed49e; --accent-dk:#080f0a;
  --pill-bg:rgba(8,14,10,0.40); --fade1:rgba(8,15,10,0.99); --fade2:rgba(8,15,10,0.0);
}
body[data-theme="rose"] {
  --bg:#110a0d; --border:rgba(255,255,255,0.08); --border-hi:rgba(255,255,255,0.16);
  --text:#f2e8eb; --muted:rgba(242,232,235,0.42);
  --accent:#e87fa0; --accent-hi:#f09db8; --accent-dk:#110a0d;
  --pill-bg:rgba(16,10,13,0.40); --fade1:rgba(17,10,13,0.99); --fade2:rgba(17,10,13,0.0);
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow-x: hidden;
  transition: background 0.35s;
}

/* ─── TOP BLUR + FADE ─── */
.pb { position:fixed; top:0; left:0; right:0; height:var(--top-h); pointer-events:none; z-index:8; }
.pb1 { backdrop-filter:blur(10px) saturate(150%); -webkit-backdrop-filter:blur(10px) saturate(150%); mask-image:linear-gradient(to bottom,black 0%,black 30%,transparent 100%); -webkit-mask-image:linear-gradient(to bottom,black 0%,black 30%,transparent 100%); }
.pb2 { backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); mask-image:linear-gradient(to bottom,transparent 10%,black 35%,transparent 80%); -webkit-mask-image:linear-gradient(to bottom,transparent 10%,black 35%,transparent 80%); }
.pb3 { backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); mask-image:linear-gradient(to bottom,transparent 50%,black 70%,transparent 100%); -webkit-mask-image:linear-gradient(to bottom,transparent 50%,black 70%,transparent 100%); }
.top-fade { position:fixed; top:0; left:0; right:0; height:var(--top-h); background:linear-gradient(to bottom,var(--fade1) 0%,var(--fade2) 100%); z-index:9; pointer-events:none; transition:background 0.35s; }
.bottom-fade { position:fixed; bottom:0; left:0; right:0; height:var(--bot-h); background:linear-gradient(to top,var(--fade1) 0%,var(--fade2) 100%); z-index:9; pointer-events:none; transition:background 0.35s; }

/* ─── Photos title ─── */
.photos-title { position:fixed; top:22px; left:20px; z-index:20; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:2.6rem; color:var(--text); letter-spacing:-0.01em; line-height:1; pointer-events:none; text-shadow:0 2px 16px rgba(0,0,0,0.6); transition:color 0.35s; }

/* ─── ADD FAB ─── */
.add-fab {
  position:fixed; top:26px; right:20px; z-index:20;
  width:50px; height:50px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.30);
  color:var(--text); font-size:1.55rem; font-weight:300;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; line-height:1; background:transparent;
  isolation:isolate; overflow:hidden;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.75),
    0 4px 14px rgba(0,0,0,0.55),
    0 1px 0 rgba(255,255,255,0.30) inset;
  transition:all 0.22s;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.add-fab::before {
  content:''; position:absolute; inset:0; z-index:-2; border-radius:50%;
  background:transparent;
  backdrop-filter:blur(80px) saturate(180%);
  -webkit-backdrop-filter:blur(80px) saturate(180%);
}
.add-fab::after {
  content:''; position:absolute; inset:0; z-index:-1; border-radius:50%;
  background:linear-gradient(160deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.07) 50%,rgba(0,0,0,0.10) 100%);
}
.add-fab:hover { border-color:rgba(255,255,255,0.5); color:#fff; transform:scale(1.08); }
.add-fab:active { transform:scale(0.93); }

/* ─── BOTTOM-LEFT PILL ─── */
.pill-wrap {
  position: fixed; bottom: 0; left: 0;
  z-index: 20;
  padding: 0 0 max(22px, env(safe-area-inset-bottom, 22px)) 18px;
  pointer-events: none;
}

/*
  Apple frosted glass recipe:
  - isolation + overflow:hidden clips the blur to the pill shape
  - ::before = the actual blur layer (very transparent bg so blur is visible)
  - ::after  = the white frosted coating on top (like iOS frosted glass tint)
  - border   = thin bright rim, like light catching the edge of real glass
*/
header {
  pointer-events: all;
  position: relative;
  display: flex; align-items: center; gap: 8px;
  padding: 13px 13px 13px 18px;
  border-radius: 999px;
  white-space: nowrap;
  isolation: isolate;
  overflow: hidden;
  background: transparent;
  /* Glass rim light */
  border: 1px solid rgba(255,255,255,0.30);
  box-shadow:
    /* outer glow / depth */
    0 20px 60px rgba(0,0,0,0.80),
    0 6px 20px rgba(0,0,0,0.60),
    /* inner top highlight — key to the Apple look */
    0 1px 0 rgba(255,255,255,0.35) inset;
  transition: border-color 0.35s;
}

/* Layer 1: heavy backdrop blur — this blurs everything behind */
header::before {
  content: '';
  position: absolute; inset: 0; z-index: -2;
  border-radius: 999px;
  background: transparent;
  backdrop-filter: blur(80px) saturate(180%);
  -webkit-backdrop-filter: blur(80px) saturate(180%);
}

/* Layer 2: frosted white tint — sits on top of the blur, gives the "glass" look */
header::after {
  content: '';
  position: absolute; inset: 0; z-index: -1;
  border-radius: 999px;
  /* This is the secret: a semi-opaque tinted coat, like iOS material */
  background: linear-gradient(
    160deg,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.07) 50%,
    rgba(0,0,0,0.10) 100%
  );
}

.pill-div { flex-shrink:0; width:1px; height:20px; background:rgba(255,255,255,0.25); }
.pill-count { font-size:0.72rem; color:var(--text); letter-spacing:0.05em; font-weight:400; flex-shrink:0; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
.pill-icon-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.20);
  color: var(--text); border-radius: 50%;
  width: 38px; height: 38px; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.18s; flex-shrink: 0;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.pill-icon-btn:hover, .pill-icon-btn.active { background:var(--accent); border-color:var(--accent); color:var(--accent-dk); text-shadow:none; }

/* ─── SETTINGS ─── */
.settings-panel { position:fixed; bottom:90px; left:18px; width:min(310px,calc(100vw - 36px)); background:rgba(10,11,20,0.78); backdrop-filter:blur(44px) saturate(180%); -webkit-backdrop-filter:blur(44px) saturate(180%); border:1px solid var(--border-hi); border-radius:22px; padding:0; z-index:50; display:none; box-shadow:0 -4px 30px rgba(0,0,0,0.4),0 20px 50px rgba(0,0,0,0.35); overflow:hidden; transition:background 0.35s; }
.settings-panel.open { display:block; animation:slideUp 0.22s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.s-inner { max-height:70vh; overflow-y:auto; padding:20px; scrollbar-width:none; }
.s-inner::-webkit-scrollbar { display:none; }
.s-section { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.15em; color:var(--accent); font-weight:600; margin:14px 0 10px; transition:color 0.35s; }
.s-section:first-child { margin-top:0; }
.s-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; }
.s-label { font-size:0.77rem; color:var(--muted); font-weight:400; }
.s-label small { display:block; font-size:0.67rem; color:var(--muted); opacity:0.6; margin-top:1px; }
.seg { display:flex; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.seg-b { background:none; border:none; color:var(--muted); padding:5px 9px; font-size:0.68rem; cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.14s; white-space:nowrap; }
.seg-b.active { background:var(--accent); color:var(--accent-dk); font-weight:600; }
.swatches { display:flex; gap:7px; }
.sw { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.18s; }
.sw.active { border-color:var(--text); transform:scale(1.18); }
.sw[data-t="default"] { background:radial-gradient(circle at 35% 35%,#7c9cff,#0b0c14); }
.sw[data-t="noir"]    { background:radial-gradient(circle at 35% 35%,#d4af7a,#080808); }
.sw[data-t="forest"]  { background:radial-gradient(circle at 35% 35%,#6dbf7e,#080f0a); }
.sw[data-t="rose"]    { background:radial-gradient(circle at 35% 35%,#e87fa0,#110a0d); }
.toggle { position:relative; width:38px; height:21px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.t-sl { position:absolute; inset:0; background:rgba(255,255,255,0.08); border-radius:999px; cursor:pointer; transition:background 0.3s; border:1px solid var(--border); }
.t-sl::before { content:''; position:absolute; width:15px; height:15px; left:3px; top:50%; transform:translateY(-50%); background:var(--muted); border-radius:50%; transition:all 0.3s; }
.toggle input:checked + .t-sl { background:var(--accent); }
.toggle input:checked + .t-sl::before { left:calc(100% - 18px); background:var(--accent-dk); }
.s-sep { height:1px; background:var(--border); margin:12px 0; }
.s-action-btn { width:100%; padding:9px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); border-radius:10px; font-size:0.75rem; cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.18s; letter-spacing:0.03em; text-align:left; display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.s-action-btn:hover { background:rgba(255,255,255,0.11); }
.s-action-btn:last-child { margin-bottom:0; }
.s-action-btn.danger { background:rgba(220,60,60,0.1); border-color:rgba(220,60,60,0.22); color:#e08080; }
.s-action-btn.danger:hover { background:rgba(220,60,60,0.2); }

/* ─── GRID ─── */
.scroll-wrap { padding-top:14px; padding-bottom:130px; padding-left:12px; padding-right:12px; }
.gallery-grid { columns:var(--col); column-gap:10px; }
.gallery-item { break-inside:avoid; margin-bottom:10px; position:relative; overflow:hidden; border-radius:var(--radius); cursor:pointer; animation:fadeUp 0.42s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.gallery-item img { width:100%; display:block; transition:transform 0.5s cubic-bezier(.25,.46,.45,.94); border-radius:var(--radius); }
.gallery-item:hover img { transform:scale(1.05); }
.item-ov { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.5) 0%,transparent 50%); opacity:0; transition:opacity 0.25s; border-radius:var(--radius); }
.gallery-item:hover .item-ov, .gallery-item:active .item-ov { opacity:1; }
body.grid-square .gallery-item img { aspect-ratio:1/1; object-fit:cover; }

/* ─── EMPTY ─── */
.empty-state { text-align:center; padding:100px 24px 60px; display:none; }
.empty-state.show { display:block; }
.empty-icon { font-size:3rem; margin-bottom:14px; opacity:0.2; }
.empty-state h2 { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.7rem; color:var(--muted); margin-bottom:8px; }
.empty-state p { color:var(--muted); font-size:0.83rem; font-weight:300; line-height:1.65; }

/* ─────────────────────────────────────────────
   LIGHTBOX — open animation + blur background
───────────────────────────────────────────── */
.lightbox {
  position: fixed; inset: 0;
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  /* starts invisible */
  opacity: 0; pointer-events: none;
  transition: opacity 0s;
}
.lightbox.opening {
  opacity: 1; pointer-events: all;
  transition: opacity 0.01s;
}
.lightbox.open {
  opacity: 1; pointer-events: all;
}

/* The actual blurred dark backdrop */
.lb-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0);
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  transition: background 0.38s ease, backdrop-filter 0.38s ease, -webkit-backdrop-filter 0.38s ease;
}
.lightbox.open .lb-backdrop {
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(18px) saturate(120%);
  -webkit-backdrop-filter: blur(18px) saturate(120%);
}

/* Main image — animates from a thumbnail rect to full */
.lb-img-wrap {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  flex: 1; width: 100%;
  padding: 60px 16px 0;
}
.lb-img-wrap img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  /* start: small, same position as thumbnail */
  transform: scale(0.55) translateY(30px);
  opacity: 0;
  transition:
    transform 0.42s cubic-bezier(0.34, 1.28, 0.64, 1),
    opacity 0.28s ease,
    border-radius 0.4s ease;
  object-fit: contain;
}
.lightbox.open .lb-img-wrap img {
  transform: scale(1) translateY(0);
  opacity: 1;
  border-radius: 10px;
}

/* Close X */
.lb-x {
  position: fixed; top:20px; right:20px; z-index: 110;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  color: #fff; border-radius: 50%;
  width: 42px; height: 42px; font-size:1.1rem;
  cursor: pointer; display:flex; align-items:center; justify-content:center;
  transition: all 0.18s;
  opacity: 0;
}
.lightbox.open .lb-x { opacity: 1; transition: opacity 0.3s 0.2s, background 0.18s; }
.lb-x:hover { background: rgba(255,255,255,0.2); }

/* ─── THUMBNAIL STRIP ─── */
.lb-strip-wrap {
  position: relative; z-index: 2;
  width: 100%;
  padding: 14px 16px max(18px, env(safe-area-inset-bottom, 18px));
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.3s 0.18s, transform 0.35s 0.18s cubic-bezier(.25,.46,.45,.94);
}
.lightbox.open .lb-strip-wrap { opacity: 1; transform: translateY(0); }

/* action bar */
.lb-actions {
  display: flex; justify-content: center; gap: 10px;
  margin-bottom: 14px;
}
.lb-act-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.13);
  color: #fff; border-radius: 14px;
  padding: 10px 16px; cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.18s; backdrop-filter: blur(10px); font-weight: 400;
  min-width: 58px;
}
.lb-act-btn .lb-icon { font-size: 1.15rem; line-height: 1; }
.lb-act-btn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
.lb-act-btn.del { border-color: rgba(220,60,60,0.3); color: #f08080; }
.lb-act-btn.del:hover { background: rgba(220,60,60,0.2); border-color: rgba(220,60,60,0.5); }

/* thumbnail row */
.lb-thumbs {
  display: flex; gap: 7px;
  overflow-x: auto; scroll-snap-type: x mandatory;
  padding-bottom: 4px; scrollbar-width: none;
  justify-content: flex-start;
}
.lb-thumbs::-webkit-scrollbar { display: none; }
.lb-thumb {
  flex-shrink: 0; scroll-snap-align: center;
  width: 54px; height: 54px;
  border-radius: 8px; overflow: hidden; cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.18s; opacity: 0.55;
}
.lb-thumb.active { border-color: var(--accent); opacity: 1; transform: scale(1.06); }
.lb-thumb:hover { opacity: 0.85; }
.lb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

/* ─── TOAST ─── */
.toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:rgba(20,22,35,0.9); backdrop-filter:blur(16px); border:1px solid var(--border-hi); border-radius:999px; padding:9px 20px; font-size:0.78rem; color:var(--text); z-index:500; opacity:0; pointer-events:none; transition:opacity 0.25s; white-space:nowrap; }
.toast.show { opacity:1; }

/* ─── SLIDESHOW ─── */
.slideshow-overlay { position:fixed; inset:0; background:#000; z-index:300; display:none; align-items:center; justify-content:center; }
.slideshow-overlay.on { display:flex; }
.ss-img { max-width:100vw; max-height:100vh; object-fit:contain; animation:ssFade 0.6s ease; }
@keyframes ssFade { from{opacity:0} to{opacity:1} }
.ss-bar { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:12px; align-items:center; background:rgba(0,0,0,0.5); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:10px 18px; }
.ss-btn { background:none; border:none; color:#fff; font-size:1.3rem; cursor:pointer; opacity:0.7; transition:opacity 0.15s; }
.ss-btn:hover { opacity:1; }
.ss-close { position:fixed; top:20px; right:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:#fff; border-radius:50%; width:42px; height:42px; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(12px); }
.ss-counter { font-size:0.75rem; color:rgba(255,255,255,0.5); font-family:'Outfit',sans-serif; min-width:40px; text-align:center; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:99px; }
#fileInput { display:none; }
</style>
</head>
<body data-theme="default">

<div class="pb pb1"></div>
<div class="pb pb2"></div>
<div class="pb pb3"></div>
<div class="top-fade"></div>
<div class="bottom-fade"></div>

<div class="photos-title">Photos</div>
<button class="add-fab" onclick="document.getElementById('fileInput').click()" title="Adicionar foto">＋</button>

<div class="toast" id="toast"></div>

<!-- SLIDESHOW -->
<div class="slideshow-overlay" id="ssOverlay">
  <button class="ss-close" onclick="stopSS()">✕</button>
  <img class="ss-img" id="ssImg" src="" alt="">
  <div class="ss-bar">
    <button class="ss-btn" onclick="ssPrev()">‹</button>
    <span class="ss-counter" id="ssCtr"></span>
    <button class="ss-btn" id="ssPauseBtn" onclick="toggleSSPause()">⏸</button>
    <button class="ss-btn" onclick="ssNext()">›</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-panel" id="settingsPanel">
  <div class="s-inner">
    <div class="s-section">Aparência</div>
    <div class="s-row">
      <span class="s-label">Tema</span>
      <div class="swatches">
        <div class="sw active" data-t="default" onclick="setTheme('default',this)"></div>
        <div class="sw" data-t="noir"   onclick="setTheme('noir',this)"></div>
        <div class="sw" data-t="forest" onclick="setTheme('forest',this)"></div>
        <div class="sw" data-t="rose"   onclick="setTheme('rose',this)"></div>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">Colunas</span>
      <div class="seg" id="colCtrl">
        <button class="seg-b" onclick="setCols(2)">2</button>
        <button class="seg-b active" onclick="setCols(3)">3</button>
        <button class="seg-b" onclick="setCols(4)">4</button>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">Estilo</span>
      <div class="seg" id="gridCtrl">
        <button class="seg-b active" onclick="setGridStyle('masonry')">Livre</button>
        <button class="seg-b" onclick="setGridStyle('square')">Quadrado</button>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">Cantos</span>
      <div class="seg" id="radiusCtrl">
        <button class="seg-b" onclick="setRadius('0px')">Reto</button>
        <button class="seg-b active" onclick="setRadius('12px')">Médio</button>
        <button class="seg-b" onclick="setRadius('22px')">Oval</button>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">Espaçamento</span>
      <div class="seg" id="gapCtrl">
        <button class="seg-b active" onclick="setGap('compact')">Compacto</button>
        <button class="seg-b" onclick="setGap('loose')">Solto</button>
      </div>
    </div>
    <div class="s-sep"></div>
    <div class="s-section">Organização</div>
    <div class="s-row">
      <span class="s-label">Ordenar por data</span>
      <label class="toggle"><input type="checkbox" id="sortToggle" onchange="toggleSort()"><span class="t-sl"></span></label>
    </div>
    <div class="s-row">
      <span class="s-label">Animação entrada</span>
      <label class="toggle"><input type="checkbox" id="animToggle" checked onchange="toggleAnim()"><span class="t-sl"></span></label>
    </div>
    <div class="s-sep"></div>
    <div class="s-section">Slideshow</div>
    <div class="s-row">
      <span class="s-label">Velocidade</span>
      <div class="seg" id="ssSpeedCtrl">
        <button class="seg-b" onclick="setSsSpeed(2000)">Rápido</button>
        <button class="seg-b active" onclick="setSsSpeed(4000)">Normal</button>
        <button class="seg-b" onclick="setSsSpeed(7000)">Lento</button>
      </div>
    </div>
    <button class="s-action-btn" onclick="startSS()">▶ &nbsp;Iniciar slideshow</button>
    <div class="s-sep"></div>
    <div class="s-section">Dados</div>
    <button class="s-action-btn" onclick="exportAll()">⬇ &nbsp;Exportar todas as fotos</button>
    <button class="s-action-btn" onclick="copyCount()">📋 &nbsp;Copiar contagem</button>
    <button class="s-action-btn danger" onclick="clearAll()">🗑 &nbsp;Limpar galeria</button>
  </div>
</div>

<!-- BOTTOM-LEFT PILL -->
<div class="pill-wrap">
  <header>
    <span class="pill-count" id="photoCount">0 fotos</span>
    <div class="pill-div"></div>
    <button class="pill-icon-btn" id="settingsBtn" onclick="toggleSettings()" title="Configurações">⚙</button>
  </header>
</div>

<input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(event)">

<!-- SCROLL -->
<div class="scroll-wrap">
  <div class="empty-state show" id="emptyState">
    <div class="empty-icon">🖼</div>
    <h2>Sua galeria está vazia</h2>
    <p>Toque em <strong>＋</strong> no canto superior direito<br>para adicionar fotos do seu dispositivo</p>
  </div>
  <div class="gallery-grid" id="grid"></div>
</div>

<!-- ═══════════════════════════════
     LIGHTBOX
═══════════════════════════════ -->
<div class="lightbox" id="lightbox">
  <div class="lb-backdrop" onclick="closeLightbox()"></div>

  <button class="lb-x" onclick="closeLightbox()">✕</button>

  <!-- main image -->
  <div class="lb-img-wrap">
    <img id="lbImg" src="" alt="">
  </div>

  <!-- strip: actions + thumbnails -->
  <div class="lb-strip-wrap">
    <div class="lb-actions">
      <button class="lb-act-btn" onclick="lbDownload()">
        <span class="lb-icon">⬇</span>Baixar
      </button>
      <button class="lb-act-btn" onclick="lbShare()">
        <span class="lb-icon">↑</span>Compartilhar
      </button>
      <button class="lb-act-btn" onclick="lbInfo()">
        <span class="lb-icon">ℹ</span>Info
      </button>
      <button class="lb-act-btn" onclick="lbFav()">
        <span class="lb-icon" id="favIcon">♡</span><span id="favLabel">Favorito</span>
      </button>
      <button class="lb-act-btn del" onclick="lbDelete()">
        <span class="lb-icon">🗑</span>Excluir
      </button>
    </div>

    <div class="lb-thumbs" id="lbThumbs"></div>
  </div>
</div>

<script>
let photos = JSON.parse(localStorage.getItem('gallery_photos') || '[]');
let favs   = JSON.parse(localStorage.getItem('gallery_favs')   || '[]');
let currentLb = 0, sortByDate = false, animOn = true;
let ssIdx = 0, ssTimer = null, ssSpeed = 4000, ssPaused = false;

// restore prefs
const savedTheme = localStorage.getItem('gallery_theme') || 'default';
document.body.setAttribute('data-theme', savedTheme);
document.querySelectorAll('.sw').forEach(s => s.classList.toggle('active', s.dataset.t === savedTheme));
const savedCols = localStorage.getItem('gallery_cols') || '3';
document.documentElement.style.setProperty('--col', savedCols);
document.querySelectorAll('#colCtrl .seg-b').forEach((b,i)=>b.classList.toggle('active',[2,3,4][i]===+savedCols));
const savedRadius = localStorage.getItem('gallery_radius') || '12px';
document.documentElement.style.setProperty('--radius', savedRadius);
['0px','12px','22px'].forEach((r,i)=>document.querySelectorAll('#radiusCtrl .seg-b')[i]?.classList.toggle('active',r===savedRadius));

function save()  { try { localStorage.setItem('gallery_photos', JSON.stringify(photos)); } catch(e){} }
function saveFav(){ try { localStorage.setItem('gallery_favs',   JSON.stringify(favs));   } catch(e){} }

function render() {
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  document.getElementById('photoCount').textContent = photos.length + ' foto' + (photos.length!==1?'s':'');
  if (!photos.length) { empty.classList.add('show'); grid.innerHTML=''; return; }
  empty.classList.remove('show');
  const list = sortByDate ? [...photos].reverse() : photos;
  grid.innerHTML = list.map((p,i)=>`
    <div class="gallery-item" style="${animOn?`animation-delay:${Math.min(i,18)*0.028}s`:'animation:none'}" onclick="openLightbox(${photos.indexOf(p)})">
      <img src="${p.src}" alt="foto ${i+1}" loading="lazy">
      <div class="item-ov"></div>
    </div>`).join('');
}

function handleFiles(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let n = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = ev => {
      photos.push({src:ev.target.result, date:Date.now(), name:f.name, size:f.size});
      if (++n === files.length) { save(); render(); toast(`${files.length} foto${files.length>1?'s':''} adicionada${files.length>1?'s':''}`); }
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

/* ─── LIGHTBOX ─── */
function openLightbox(idx) {
  currentLb = idx;
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lbImg');
  img.src = photos[idx].src;
  lb.classList.remove('open');
  lb.style.display = 'flex';
  // Force a frame then animate
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    lb.classList.add('open');
    renderStrip();
    updateFavUI();
  }));
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lbImg');
  // reverse animation
  lb.classList.remove('open');
  img.style.transform = 'scale(0.55) translateY(30px)';
  img.style.opacity = '0';
  setTimeout(() => { lb.style.display = ''; img.style.transform=''; img.style.opacity=''; }, 420);
}

function renderStrip() {
  const strip = document.getElementById('lbThumbs');
  strip.innerHTML = photos.map((p,i) => `
    <div class="lb-thumb ${i===currentLb?'active':''}" onclick="lbGoTo(${i})">
      <img src="${p.src}" alt="">
    </div>`).join('');
  // scroll active thumb into view
  setTimeout(()=>{
    const active = strip.querySelector('.active');
    active?.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 80);
}

function lbGoTo(i) {
  currentLb = i;
  const img = document.getElementById('lbImg');
  img.style.transition = 'opacity 0.15s';
  img.style.opacity = '0';
  setTimeout(()=>{ img.src = photos[i].src; img.style.opacity='1'; }, 150);
  document.querySelectorAll('.lb-thumb').forEach((t,j)=>t.classList.toggle('active',j===i));
  const active = document.querySelector('.lb-thumb.active');
  active?.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  updateFavUI();
}

function lbDelete() {
  if (!confirm('Remover esta foto?')) return;
  photos.splice(currentLb, 1);
  favs = favs.filter(f=>f<photos.length);
  save(); saveFav(); render();
  if (!photos.length) { closeLightbox(); return; }
  currentLb = Math.min(currentLb, photos.length-1);
  document.getElementById('lbImg').src = photos[currentLb].src;
  renderStrip(); updateFavUI();
  toast('Foto removida');
}

function lbDownload() {
  const a = document.createElement('a');
  a.href = photos[currentLb].src;
  a.download = photos[currentLb].name || `foto_${currentLb+1}.jpg`;
  a.click();
  toast('Download iniciado');
}

function lbShare() {
  if (navigator.share) {
    fetch(photos[currentLb].src)
      .then(r=>r.blob())
      .then(blob=>{
        const file = new File([blob], 'foto.jpg', {type:'image/jpeg'});
        navigator.share({ files:[file], title:'Foto' }).catch(()=>{});
      });
  } else {
    navigator.clipboard?.writeText(photos[currentLb].src).then(()=>toast('Link copiado!'));
  }
}

function lbInfo() {
  const p = photos[currentLb];
  const kb = p.size ? (p.size/1024).toFixed(1)+'KB' : '—';
  const date = new Date(p.date).toLocaleString('pt-BR');
  toast(`📅 ${date} · ${kb}`);
}

function lbFav() {
  const i = favs.indexOf(currentLb);
  if (i>=0) { favs.splice(i,1); toast('Removido dos favoritos'); }
  else       { favs.push(currentLb);  toast('⭐ Adicionado aos favoritos'); }
  saveFav(); updateFavUI();
}
function updateFavUI() {
  const isFav = favs.includes(currentLb);
  document.getElementById('favIcon').textContent  = isFav ? '★' : '♡';
  document.getElementById('favLabel').textContent = isFav ? 'Favorito' : 'Favorito';
  document.getElementById('favIcon').style.color  = isFav ? '#f5c842' : '';
}

// swipe on lightbox
let tsX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => { tsX = e.touches[0].clientX; }, {passive:true});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsX;
  if (Math.abs(dx) > 50) { lbGoTo((currentLb + (dx<0?1:-1) + photos.length) % photos.length); }
}, {passive:true});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='ArrowRight') lbGoTo((currentLb+1)%photos.length);
  if (e.key==='ArrowLeft')  lbGoTo((currentLb-1+photos.length)%photos.length);
  if (e.key==='Escape') closeLightbox();
});

/* ─── DATA ─── */
function clearAll(){
  if(!confirm('Remover todas as fotos?')) return;
  photos=[]; favs=[]; save(); saveFav(); render();
  document.getElementById('settingsPanel').classList.remove('open');
  toast('Galeria limpa');
}
function exportAll(){
  if(!photos.length){ toast('Nenhuma foto para exportar'); return; }
  photos.forEach((p,i)=>setTimeout(()=>{ const a=document.createElement('a'); a.href=p.src; a.download=p.name||`foto_${i+1}.jpg`; a.click(); },i*250));
  toast(`Exportando ${photos.length} foto${photos.length>1?'s':''}…`);
}
function copyCount(){
  const txt=`${photos.length} foto${photos.length!==1?'s':''}`;
  navigator.clipboard?.writeText(txt).then(()=>toast('Copiado!')).catch(()=>toast(txt));
}

/* ─── TOAST ─── */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ─── SLIDESHOW ─── */
function startSS(){
  if(!photos.length){ toast('Adicione fotos primeiro'); return; }
  document.getElementById('settingsPanel').classList.remove('open');
  ssIdx=0; ssPaused=false;
  document.getElementById('ssPauseBtn').textContent='⏸';
  showSSFrame();
  document.getElementById('ssOverlay').classList.add('on');
  ssTimer=setInterval(ssNext,ssSpeed);
}
function showSSFrame(){ const img=document.getElementById('ssImg'); img.style.opacity=0; setTimeout(()=>{img.src=photos[ssIdx].src; img.style.transition='opacity 0.5s'; img.style.opacity=1;},50); document.getElementById('ssCtr').textContent=(ssIdx+1)+'/'+photos.length; }
function ssNext(){ ssIdx=(ssIdx+1)%photos.length; showSSFrame(); }
function ssPrev(){ clearInterval(ssTimer); ssIdx=(ssIdx-1+photos.length)%photos.length; showSSFrame(); if(!ssPaused) ssTimer=setInterval(ssNext,ssSpeed); }
function stopSS(){ clearInterval(ssTimer); document.getElementById('ssOverlay').classList.remove('on'); }
function toggleSSPause(){ ssPaused=!ssPaused; document.getElementById('ssPauseBtn').textContent=ssPaused?'▶':'⏸'; if(ssPaused) clearInterval(ssTimer); else ssTimer=setInterval(ssNext,ssSpeed); }
function setSsSpeed(ms){ ssSpeed=ms; document.querySelectorAll('#ssSpeedCtrl .seg-b').forEach((b,i)=>b.classList.toggle('active',[2000,4000,7000][i]===ms)); if(ssTimer){clearInterval(ssTimer);ssTimer=setInterval(ssNext,ssSpeed);} }

/* ─── SETTINGS ─── */
function toggleSettings(){
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('settingsBtn').classList.toggle('active');
}
document.addEventListener('click',e=>{
  const panel=document.getElementById('settingsPanel'), wrap=document.querySelector('.pill-wrap');
  if(panel.classList.contains('open')&&!panel.contains(e.target)&&!wrap.contains(e.target)){
    panel.classList.remove('open'); document.getElementById('settingsBtn').classList.remove('active');
  }
});
function setTheme(t,el){ document.body.setAttribute('data-theme',t); document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('active',s.dataset.t===t)); localStorage.setItem('gallery_theme',t); }
function setCols(n){ document.documentElement.style.setProperty('--col',n); document.querySelectorAll('#colCtrl .seg-b').forEach((b,i)=>b.classList.toggle('active',[2,3,4][i]===n)); localStorage.setItem('gallery_cols',n); }
function setGridStyle(s){ document.body.classList.toggle('grid-square',s==='square'); document.querySelectorAll('#gridCtrl .seg-b').forEach((b,i)=>b.classList.toggle('active',['masonry','square'][i]===s)); }
function setRadius(r){ document.documentElement.style.setProperty('--radius',r); document.querySelectorAll('#radiusCtrl .seg-b').forEach((b,i)=>b.classList.toggle('active',['0px','12px','22px'][i]===r)); localStorage.setItem('gallery_radius',r); }
function setGap(m){ const g=m==='loose'?'18px':'10px'; document.querySelector('.gallery-grid').style.columnGap=g; document.querySelectorAll('.gallery-item').forEach(el=>el.style.marginBottom=g); document.querySelectorAll('#gapCtrl .seg-b').forEach((b,i)=>b.classList.toggle('active',i===(m==='loose'?1:0))); }
function toggleSort(){ sortByDate=document.getElementById('sortToggle').checked; render(); }
function toggleAnim(){ animOn=document.getElementById('animToggle').checked; render(); }

render();
</script>
</body>
</html>
